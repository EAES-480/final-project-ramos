# Introduction

## Objective

#Statistical Significance
##Randomization Test
**Null Hypothesis (`\(H_0\)`):** There is no difference in the mean `\(Eu/Eu^*\)` between PCD and Barren apatite. (The variables are independent)


**Alternative Hypothesis (`\(H_A\)`):** There is a significant difference in the mean `\(Eu/Eu^*\)` between the two groups.

``` r
set.seed(12)
obs_diff &lt;- df_clean %&gt;%
  specify(Eu_anomaly ~ Type) %&gt;% calculate(stat = "diff in means", order = c("PCD", "Barren"))

null_dist &lt;- df_clean %&gt;%
  specify(Eu_anomaly ~ Type) %&gt;%
  hypothesize(null = "independence") %&gt;%
  generate(reps = 1000, type = "permute") %&gt;%
  calculate(stat = "diff in means", order = c("PCD", "Barren"))
```

#Statistical Significance
## Bootstrap

While the randomization test tells us the difference is significant.
Calculating the 95% Bootstrap CI quantifies the magnitude of this difference.

`$$(\bar{x}_{PCD} - \bar{x}_{Barren})$$`


``` r
set.seed(12)

# Bootstrap distribution
boot_dist &lt;- df_clean %&gt;%
  specify(Eu_anomaly ~ Type) %&gt;%
  generate(reps = 1000, type = "bootstrap") %&gt;%
  calculate(stat = "diff in means", order = c("PCD", "Barren"))

# 95% CI
percentile_ci &lt;- boot_dist %&gt;%
  get_confidence_interval(level = 0.95, type = "percentile")
```

##Linear Modeling
To quantify the variance explained by the deposit type

``` r
eu_model &lt;- lm(Eu_anomaly ~ Type, data = df_clean)
model_results &lt;- augment(eu_model)
rmse_calc &lt;- model_results %&gt;% 
  summarize(RMSE = sqrt(mean(.resid^2)))
```

#Statistical Significance
## Comprehensive Analysis of All REEs

Instead of analyzing each REE individually, I iterated through all normalized REEs. This pipeline applies the simple linear model, the randomization test (1000 permutations), and the bootstrap CI (1000 resamples) to every geochemical variable.


``` r
# Group by the Element name
df_long &lt;- df_clean %&gt;%
  select(Type, La_N:Lu_N) %&gt;%
  pivot_longer(cols = -Type, names_to = "Element", values_to = "Value") %&gt;%
  glimpse()
```

```
## Rows: 2,655
## Columns: 3
## $ Type    &lt;chr&gt; "Barren", "Barren", "Barren", "Barren", "Barren", "Barren", "B…
## $ Element &lt;chr&gt; "La_N", "Ce_N", "Pr_N", "Nd_N", "Sm_N", "Eu_N", "Gd_N", "Eu_an…
## $ Value   &lt;dbl&gt; 7565.4008439, 6616.0130719, 5350.8771930, 3407.0021882, 1662.1…

#Statistical Significance

``` r
analyze_element &lt;- function(sub_df) {
  set.seed(12)
# Slope and R-Squared
  fit &lt;- lm(Value ~ Type, data = sub_df)
  tidy_fit &lt;- tidy(fit) %&gt;% filter(term == "TypePCD")
  glance_fit &lt;- glance(fit)
# Observed Difference
  obs &lt;- sub_df %&gt;%
    specify(Value ~ Type) %&gt;%
    calculate(stat = "diff in means", order = c("PCD", "Barren"))
# Randomization Test
  null_dist &lt;- sub_df %&gt;%
    specify(Value ~ Type) %&gt;%
    hypothesize(null = "independence") %&gt;%
    generate(reps = 1000, type = "permute") %&gt;%
    calculate(stat = "diff in means", order = c("PCD", "Barren"))
  p_val &lt;- null_dist %&gt;% get_p_value(obs_stat = obs, direction = "two-sided")
# Bootstrap CI
  boot_dist &lt;- sub_df %&gt;%
    specify(Value ~ Type) %&gt;%
    generate(reps = 1000, type = "bootstrap") %&gt;%
    calculate(stat = "diff in means", order = c("PCD", "Barren"))
  ci &lt;- boot_dist %&gt;% get_confidence_interval(level = 0.95, type = "percentile")
  
  # Summarize
  tibble(
    Difference_in_Means = tidy_fit$estimate,
    R_Squared = glance_fit$r.squared,
    Rand_P_Value = p_val$p_value,
    CI_Lower = ci$lower_ci,
    CI_Upper = ci$upper_ci
  )
}
```

#Classification Tree

Using all 14 REEs simultaneously to find the optimal geochemical thresholds.


``` r
tree_data &lt;- df_clean %&gt;%
  select(Type, Eu_anomaly, La_N:Lu_N)

tree_spec &lt;- decision_tree() %&gt;%
  set_mode("classification") %&gt;%
  set_engine("rpart")

tree_recipe &lt;- recipe(Type ~ ., data = tree_data)

tree_workflow &lt;- workflow() %&gt;%
  add_recipe(tree_recipe) %&gt;%
  add_model(tree_spec)


tree_fit &lt;- tree_workflow %&gt;%
  fit(data = tree_data)
```

#Conclusions

&lt;div style="font-size: 28px;"&gt;
- The Europium anomaly (`\(Eu/Eu^*\)`) is a statistically robust indicator of magmatic fertility.

--

- Classification Trees revealed that multi-element evaluation is superior. 

--

- LREE enrichment (`\(Pr_N\)`) identifies highly fractionated, barren magmatic systems before redox conditions are even considered.

--

- The oxidation state (represented by the `\(Eu\)` anomaly) acts as the definitive secondary split for fertility.
